<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FreeGive Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">🎁 Free<span class="logo-accent">Give</span></a>
            <ul class="nav-links">
                <li><a href="/search">Browse Items</a></li>
                <li><a href="/" class="btn-nav btn-nav-outline">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
        <div class="card-header" style="border:none; margin-bottom: 30px;">
            <h1 class="gradient-text">Welcome Back, Joyal!</h1>
            <a href="/post" class="btn btn-primary">+ Post New Item</a>
        </div>

        <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <!-- Mock Item 1 -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1544027993-37dbfe43562a?auto=format&fit=crop&q=80&w=400" alt="Camera" style="width:100%; height:200px; object-fit:cover; border-radius: 10px; margin-bottom: 20px;">
                <h3>Vintage Camera</h3>
                <p class="badge badge-info">Electronics</p>
                <p style="margin: 15px 0;">A classic film camera in great condition. Perfect for enthusiasts.</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #6b7280; font-size: 0.9rem;">📍 London</span>
                    <button class="btn btn-outline btn-sm">Manage</button>
                </div>
            </div>

            <!-- Mock Item 2 -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&q=80&w=400" alt="Chair" style="width:100%; height:200px; object-fit:cover; border-radius: 10px; margin-bottom: 20px;">
                <h3>Wooden Dining Chair</h3>
                <p class="badge badge-success">Furniture</p>
                <p style="margin: 15px 0;">Solid wood chair. Minor scratches but very sturdy.</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #6b7280; font-size: 0.9rem;">📍 Berlin</span>
                    <button class="btn btn-outline btn-sm">Claimed</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
