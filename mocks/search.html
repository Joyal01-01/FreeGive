<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items - FreeGive Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary">
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">🎁 Free<span class="logo-accent">Give</span></a>
            <ul class="nav-links">
                <li><a href="/login" class="btn-nav">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
        <div class="search-bar-card">
            <h2 style="margin-bottom: 20px;">Find what you need</h2>
            <div class="search-inputs">
                <input type="text" placeholder="Search for items (e.g. Chair, Camera)..." class="search-input">
                <select class="search-input">
                    <option>All Categories</option>
                    <option>Electronics</option>
                    <option>Furniture</option>
                    <option>Books</option>
                </select>
                <button class="btn btn-primary">Search</button>
            </div>
        </div>

        <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <!-- Results will be loaded here in a real app -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1544027993-37dbfe43562a?auto=format&fit=crop&q=80&w=400" alt="Camera" style="width:100%; height:200px; object-fit:cover; border-radius: 10px; margin-bottom: 20px;">
                <h3>Vintage Camera</h3>
                <p class="badge badge-info">Electronics</p>
                <p style="margin: 15px 0;">Available for pickup in London.</p>
                <button class="btn btn-outline btn-block" onclick="alert('Item Claimed! (Simulation)')">Claim This Item</button>
            </div>
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&q=80&w=400" alt="Books" style="width:100%; height:200px; object-fit:cover; border-radius: 10px; margin-bottom: 20px;">
                <h3>Classic Book Collection</h3>
                <p class="badge badge-warning">Books</p>
                <p style="margin: 15px 0;">A set of 5 classic novels. Great condition.</p>
                <button class="btn btn-outline btn-block" onclick="alert('Item Claimed! (Simulation)')">Claim This Item</button>
            </div>
        </div>
    </div>
</body>
</html>
