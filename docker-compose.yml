version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: freegive_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: freegive
      MYSQL_USER: freegive_user
      MYSQL_PASSWORD: freegive_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freegive_network

  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freegive_tomcat
    environment:
      CATALINA_OPTS: "-Ddb.host=mysql -Ddb.user=root -Ddb.password=root"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - freegive_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  freegive_network:
    driver: bridge
